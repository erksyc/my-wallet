function settleDebt(id) {
  const d = state.debts.find(d => d.id === id);
  if (!d) return;
  d.settled = true;
  d.settledDate = new Date().toISOString();
  d.partialPaid = d.amount;
  saveDebts();
  renderDebtBook();
  render();
}

function partialSettle(id) {
  const d = state.debts.find(d => d.id === id);
  if (!d) return;
  const remaining = getDebtBalance(d);
  const amt = prompt(`目前還剩 $${remaining.toLocaleString()},這次清償多少?`);
  if (amt === null) return;
  const num = parseFloat(amt);
  if (isNaN(num) || num <= 0) { alert("金額不正確"); return; }
  if (num >= remaining) {
    d.settled = true;
    d.settledDate = new Date().toISOString();
    d.partialPaid = d.amount;
  } else {
    d.partialPaid = (d.partialPaid || 0) + num;
  }
  saveDebts();
  renderDebtBook();
  render();
}

function deleteDebt(id) {
  if (!confirm("確定刪除這筆紀錄?")) return;
  state.debts = state.debts.filter(d => d.id !== id);
  saveDebts();
  renderDebtBook();
  render();
}

// ==== 紀錄管理(編輯/刪除) ====
function openRecords() {
  closeSettings();
  renderRecords();
  document.getElementById("records-overlay").style.display = "block";
  window.scrollTo(0, 0);
}

function closeRecords() {
  document.getElementById("records-overlay").style.display = "none";
}

let recordsFilter = "all"; // all / expense / income

function setRecordsFilter(f) {
  recordsFilter = f;
  renderRecords();
}

function renderRecords() {
  const container = document.getElementById("records-content");
  const yearStr = String(state.currentYear);

  let records = [];
  if (recordsFilter === "all" || recordsFilter === "expense") {
    records = records.concat(state.entries.filter(e => e.date.startsWith(yearStr)).map(e => ({ ...e, _type: "expense" })));
  }
  if (recordsFilter === "all" || recordsFilter === "income") {
    records = records.concat(state.incomes.filter(e => e.date.startsWith(yearStr)).map(e => ({ ...e, _type: "income" })));
  }
  records.sort((a, b) => new Date(b.date) - new Date(a.date));

  // 按月份分組
  const groups = {};
  for (const r of records) {
    const m = r.date.slice(0, 7);
    if (!groups[m]) groups[m] = [];
    groups[m].push(r);
  }
  const months = Object.keys(groups).sort().reverse();

  let recordsHTML = "";
  if (records.length === 0) {
    recordsHTML = `<div style="text-align:center; padding:40px 20px; color:#a8a29e; font-size:13px;">沒有紀錄</div>`;
  } else {
    for (const m of months) {
      const monthTotal = groups[m].reduce((s, r) => s + (r._type === "income" ? r.amount : -r.amount), 0);
      recordsHTML += `<div class="records-month-header">
        <span>${m}</span>
        <span style="color:${monthTotal >= 0 ? '#6b7d56' : '#44403c'}">${monthTotal >= 0 ? '+' : ''}$${monthTotal.toLocaleString()}</span>
      </div>`;
      for (const r of groups[m]) {
        const isIncome = r._type === "income";
        const cat = isIncome ? INCOME_CATEGORIES[r.category] : CATEGORIES[r.category];
        const dateStr = new Date(r.date).toLocaleDateString("zh-TW", {month:"numeric", day:"numeric"});
        const sign = isIncome ? "+" : "";
        const color = isIncome ? "#6b7d56" : "#44403c";
        recordsHTML += `<div class="record-item" onclick="editRecord('${r._type}', ${r.id})">
          <span class="record-emoji">${cat.emoji}</span>
          <div class="record-info">
            <div class="record-desc">${escapeHTML(r.desc)}</div>
            <div class="record-meta">${cat.label} · ${dateStr}</div>
          </div>
          <div class="record-amount" style="color:${color}">${sign}$${r.amount.toLocaleString()}</div>
          <span class="record-arrow">›</span>
        </div>`;
      }
    }
  }

  container.innerHTML = `
    <div class="report-header">
      <div class="report-title-block">
        <div class="report-month">All Records · ${state.currentYear}</div>
        <div class="report-title">所有紀錄</div>
      </div>
      <button class="close-report-btn" onclick="closeRecords()">關閉 ✕</button>
    </div>

    <div class="records-filter">
      <button class="filter-btn ${recordsFilter === 'all' ? 'active' : ''}" onclick="setRecordsFilter('all')">全部</button>
      <button class="filter-btn ${recordsFilter === 'expense' ? 'active' : ''}" onclick="setRecordsFilter('expense')">支出</button>
      <button class="filter-btn ${recordsFilter === 'income' ? 'active' : ''}" onclick="setRecordsFilter('income')">收入</button>
    </div>

    <div class="records-list">${recordsHTML}</div>
    <div style="height:20px"></div>
  `;
}

function editRecord(type, id) {
  const list = type === "income" ? state.incomes : state.entries;
  const cats = type === "income" ? INCOME_CATEGORIES : CATEGORIES;
  const r = list.find(x => x.id === id);
  if (!r) return;

  const dateStr = new Date(r.date).toLocaleDateString("zh-TW");
  const action = prompt(
    `「${r.desc}」 $${r.amount} · ${dateStr}\n\n` +
    `要改什麼?\n` +
    `1. 金額\n` +
    `2. 描述\n` +
    `3. 分類\n` +
    `4. 日期\n` +
    `5. 刪除\n\n` +
    `打數字選擇(空白=取消):`
  );
  if (!action || !action.trim()) return;

  switch (action.trim()) {
    case "1": {
      const v = prompt(`目前 $${r.amount}\n輸入新金額:`, r.amount);
      if (v === null || v.trim() === "") return;
      const num = parseFloat(v);
      if (isNaN(num) || num <= 0) { alert("金額不正確"); return; }
      r.amount = num;
      break;
    }
    case "2": {
      const v = prompt(`目前「${r.desc}」\n輸入新描述:`, r.desc);
      if (v === null || v.trim() === "") return;
      r.desc = v.trim();
      break;
    }
    case "3": {
      const catKeys = Object.keys(cats);
      const catList = catKeys.map((k, i) => `${i+1}. ${cats[k].emoji} ${cats[k].label}`).join("\n");
      const v = prompt(`目前 ${cats[r.category].emoji} ${cats[r.category].label}\n打數字選擇:\n${catList}`);
      if (v === null || v.trim() === "") return;
      const idx = parseInt(v) - 1;
      if (idx >= 0 && idx < catKeys.length) r.category = catKeys[idx];
      break;
    }
    case "4": {
      const cur = new Date(r.date);
      const curStr = cur.toLocaleDateString("zh-TW");
      const v = prompt(
        `目前 ${curStr}\n\n` +
        `輸入新日期:\n` +
        `· 「昨天」「前天」「3 天前」\n` +
        `· 「5/1」或「2026/5/1」\n` +
        `· 「上週三」`
        , "昨天"
      );
      if (v === null || !v.trim()) return;
      const dateInfo = parseDate(v.trim());
      if (!dateInfo.date) {
        // 嘗試直接 parse 完整日期
        const tryFull = new Date(v.trim());
        if (!isNaN(tryFull.getTime())) {
          tryFull.setHours(12, 0, 0, 0);
          r.date = tryFull.toISOString();
        } else {
          alert("看不懂這個日期,請試試「昨天」「3 天前」「5/1」這種格式");
          return;
        }
      } else {
        r.date = dateInfo.date;
      }
      break;
    }
    case "5": {
      if (!confirm(`確定刪除「${r.desc} $${r.amount}」?`)) return;
      if (type === "income") {
        state.incomes = state.incomes.filter(x => x.id !== id);
        saveIncomes();
      } else {
        state.entries = state.entries.filter(x => x.id !== id);
        saveEntries();
      }
      renderRecords();
      render();
      return;
    }
    default: return;
  }

  if (type === "income") saveIncomes();
  else saveEntries();
  renderRecords();
  render();
}
function exportData() {
  const data = {
    entries: state.entries,
    incomes: state.incomes,
    judgeLog: state.judgeLog,
    reviewedMonths: state.reviewedMonths,
    debts: state.debts,
    customKeywords: state.customKeywords,
    dismissedReclassify: state.dismissedReclassify,
    accounts: state.accounts,
    goals: state.goals,
    settings: { income: state.income, savingGoal: state.savingGoal },
    exportDate: new Date().toISOString(),
    version: 6
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `wallet-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  state.lastExport = new Date().toISOString();
  saveSettingsData();
  render();
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.entries) throw new Error("檔案格式不對");
      const confirmMsg = `將匯入 ${data.entries.length} 筆支出${data.incomes ? ` 和 ${data.incomes.length} 筆收入` : ""}${data.debts ? ` 和 ${data.debts.length} 筆人情帳` : ""},現有資料會被覆蓋,確定嗎?`;
      if (!confirm(confirmMsg)) return;
      state.entries = data.entries || [];
      state.incomes = data.incomes || [];
      state.judgeLog = data.judgeLog || [];
      state.reviewedMonths = data.reviewedMonths || [];
      state.debts = data.debts || [];
      state.customKeywords = data.customKeywords || {};
      state.dismissedReclassify = data.dismissedReclassify || [];
      state.accounts = data.accounts || [];
      state.goals = data.goals || [];
      if (data.settings) {
        if (data.settings.income) state.income = data.settings.income;
        if (data.settings.savingGoal !== undefined) state.savingGoal = data.settings.savingGoal;
      }
      saveEntries();
      saveIncomes();
      saveJudges();
      saveReviewed();
      saveDebts();
      saveCustomKeywords();
      saveDismissedReclassify();
      saveAccounts();
      saveGoals();
      saveSettingsData();
      closeSettings();
      render();
      alert("匯入成功!");
    } catch (err) {
      alert("匯入失敗:" + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = "";
}

// ==== 輸入框狀態 ====
function updateSendBtn() {
  const v = document.getElementById("input").value.trim();
  document.getElementById("send-btn").classList.toggle("active", v.length > 0);
}

// ==== 啟動 ====
loadState();
render();
document.getElementById("input").addEventListener("input", updateSendBtn);
document.getElementById("input").addEventListener("keydown", e => {
  if (e.key === "Enter") { e.preventDefault(); handleSubmit(); }
});
document.getElementById("income-input").addEventListener("input", updateBudgetHint);
document.getElementById("goal-input").addEventListener("input", updateBudgetHint);
</script>
